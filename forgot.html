<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#EEF2FF,#FDF2F8,#ECFEFF);
overflow:hidden;
position:relative;
padding:20px;
}

.blob{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.45;
animation:float 8s infinite ease-in-out;
}

.blob:nth-child(1){
width:280px;
height:280px;
background:#7C3AED;
top:-100px;
left:-80px;
}

.blob:nth-child(2){
width:250px;
height:250px;
background:#06B6D4;
bottom:-80px;
right:-80px;
animation-delay:2s;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-25px);}
}

.card{
width:430px;
padding:40px;
background:rgba(255,255,255,.75);
backdrop-filter:blur(20px);
border-radius:25px;
border:1px solid rgba(255,255,255,.4);
box-shadow:0 20px 60px rgba(0,0,0,.12);
position:relative;
z-index:5;
}

.logo{
width:70px;
height:70px;
margin:auto;
margin-bottom:20px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
background:linear-gradient(135deg,#6D5DF6,#8B5CF6);
color:white;
font-size:28px;
}

h2{
text-align:center;
color:#111827;
margin-bottom:8px;
}

.subtitle{
text-align:center;
font-size:14px;
color:#6B7280;
margin-bottom:30px;
}

.input{
margin-bottom:18px;
}

.input label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:500;
color:#374151;
}

.box{
display:flex;
align-items:center;
background:white;
height:52px;
padding:0 15px;
border-radius:14px;
border:1px solid #E5E7EB;
transition:.3s;
}

.box:hover,
.box:focus-within{
border-color:#6D5DF6;
box-shadow:0 0 0 4px rgba(109,93,246,.15);
}

.box i{
color:#9CA3AF;
}
.card{
    max-height:90vh;
    overflow-y:auto;
}
body{
    min-height:100vh;
    padding:30px;
}

.box input{
flex:1;
border:none;
outline:none;
background:none;
padding-left:12px;
font-size:15px;
}

.eye{
cursor:pointer;
}

button{
width:100%;
height:54px;
border:none;
border-radius:14px;
margin-top:10px;
background:linear-gradient(135deg,#6D5DF6,#8B5CF6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow:0 15px 30px rgba(109,93,246,.35);
}

button:hover{
transform:translateY(-3px);
}

.back{
margin-top:25px;
text-align:center;
font-size:14px;
}

.back a{
text-decoration:none;
color:#6D5DF6;
font-weight:600;
}

@media(max-width:500px){

.card{
width:95%;
padding:30px;
}

}

</style>

</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="card">

<div class="logo">
<i class="fa-solid fa-key"></i>
</div>

<h2>Forgot Password</h2>

<p class="subtitle">
Reset your password securely
</p>

<form>

<div class="input">
<label>Email Address</label>

<div class="box">
<i class="fa-regular fa-envelope"></i>
<input type="email" placeholder="Enter your email">
</div>

</div>

<div class="input">
<label>OTP</label>

<div class="box">
<i class="fa-solid fa-shield-halved"></i>
<input type="text" placeholder="Enter OTP">
</div>

</div>

<div class="input">
<label>New Password</label>

<div class="box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="pass1" placeholder="New Password">
<i class="fa-regular fa-eye eye" onclick="togglePassword('pass1',this)"></i>
</div>

</div>

<div class="input">
<label>Confirm Password</label>

<div class="box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="pass2" placeholder="Confirm Password">
<i class="fa-regular fa-eye eye" onclick="togglePassword('pass2',this)"></i>
</div>

</div>

<button type="submit">
Reset Password
</button>

<div class="back">
<a href="firstpage.html">
← Back to Login
</a>
</div>

</form>

</div>

<script>

function togglePassword(id,icon){

const input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");

}
else{

input.type="password";

icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

}

</script>

</body>
</html>
