<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
background:linear-gradient(135deg,#EEF2FF,#FDF2F8,#ECFEFF);
overflow:hidden;
position:relative;
}

.blob{
position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.45;
animation:move 8s infinite ease-in-out;
}

.blob:nth-child(1){
width:300px;
height:300px;
background:#7C3AED;
top:-100px;
left:-100px;
}

.blob:nth-child(2){
width:250px;
height:250px;
background:#06B6D4;
right:-80px;
bottom:-70px;
animation-delay:2s;
}

@keyframes move{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-30px);}
}

.card{
width:430px;
padding:40px;
background:rgba(255,255,255,.75);
backdrop-filter:blur(20px);
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,.12);
border:1px solid rgba(255,255,255,.4);
position:relative;
z-index:5;
}

.logo{
width:70px;
height:70px;
margin:auto;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#6D5DF6,#8B5CF6);
color:#fff;
font-size:28px;
margin-bottom:20px;
}

h2{
text-align:center;
color:#111827;
margin-bottom:8px;
}

.subtitle{
text-align:center;
color:#6B7280;
font-size:14px;
margin-bottom:30px;
}

.input{
margin-bottom:18px;
}

.input label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:500;
color:#374151;
}

.box{
display:flex;
align-items:center;
background:#fff;
border:1px solid #E5E7EB;
border-radius:14px;
padding:0 15px;
height:52px;
transition:.3s;
}

.box:hover,
.box:focus-within{
border-color:#6D5DF6;
box-shadow:0 0 0 4px rgba(109,93,246,.15);
}

.box i{
color:#9CA3AF;
}

.box input{
border:none;
outline:none;
flex:1;
padding-left:12px;
font-size:15px;
background:none;
}

.eye{
cursor:pointer;
}

.terms{
display:flex;
align-items:flex-start;
gap:10px;
font-size:13px;
margin:15px 0 22px;
color:#555;
}

.terms input{
margin-top:3px;
accent-color:#6D5DF6;
}

.terms a{
color:#6D5DF6;
text-decoration:none;
font-weight:500;
}
.card{
    max-height:90vh;
    overflow-y:auto;
}
body{
    min-height:100vh;
    padding:30px;
}

button{
width:100%;
height:54px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#6D5DF6,#8B5CF6);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
box-shadow:0 15px 30px rgba(109,93,246,.35);
}

button:hover{
transform:translateY(-3px);
}

.bottom{
margin-top:25px;
text-align:center;
font-size:14px;
color:#6B7280;
}

.bottom a{
text-decoration:none;
color:#6D5DF6;
font-weight:600;
}

@media(max-width:500px){

.card{
width:92%;
padding:30px;
}

}

</style>

</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="card">

<div class="logo">
<i class="fa-solid fa-user-plus"></i>
</div>

<h2>Create Account</h2>

<p class="subtitle">
Create your account to get started.
</p>

<form>

<div class="input">
<label>Full Name</label>
<div class="box">
<i class="fa-regular fa-user"></i>
<input type="text" placeholder="John Doe">
</div>
</div>

<div class="input">
<label>Username</label>
<div class="box">
<i class="fa-solid fa-at"></i>
<input type="text" placeholder="Username">
</div>
</div>

<div class="input">
<label>Email</label>
<div class="box">
<i class="fa-regular fa-envelope"></i>
<input type="email" placeholder="example@email.com">
</div>
</div>

<div class="input">
<label>Phone Number</label>
<div class="box">
<i class="fa-solid fa-phone"></i>
<input type="tel" placeholder="+91 9876543210">
</div>
</div>

<div class="input">
<label>Password</label>
<div class="box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="password" placeholder="Create Password">
<i class="fa-regular fa-eye eye" onclick="togglePassword('password',this)"></i>
</div>
</div>

<div class="input">
<label>Confirm Password</label>
<div class="box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="confirm" placeholder="Confirm Password">
<i class="fa-regular fa-eye eye" onclick="togglePassword('confirm',this)"></i>
</div>
</div>

<div class="terms">

<input type="checkbox" required>

<p>
I agree to the
<a href="#">Terms & Conditions</a>
</p>

</div>

<button type="submit">

Create Account

</button>

<div class="bottom">

Already have an account?

<a href="index.html">

Login

</a>

</div>

</form>

</div>

<script>

function togglePassword(id,icon){

let input=document.getElementById(id);

if(input.type==="password"){

input.type="text";

icon.classList.remove("fa-eye");

icon.classList.add("fa-eye-slash");

}
else{

input.type="password";

icon.classList.remove("fa-eye-slash");

icon.classList.add("fa-eye");

}

}

</script>

</body>
</html>
